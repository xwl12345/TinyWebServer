<!DOCTYPE html>
<html>

    <style>

        }

        .item a:hover { color: #99bbff; }
        .divider { width: 40px; height: 1px; background: rgba(255,255,255,0.1); margin: 24px auto; }
        .intro { font-size: 13px; color: #7777aa; line-height: 2; }
        .back { display: block; margin-top: 24px; font-size: 12px; color: #5555aa; text-decoration: none; }
