<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>徐文霖 · C++后端开发</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
        }
        .card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 48px 40px;
            text-align: center;
            max-width: 480px; width: 90%;
            backdrop-filter: blur(10px);
        }
        .name {
            font-size: 32px; font-weight: bold; color: #e0e0ff;
            margin-bottom: 6px;
        }
        .subtitle {
            font-size: 15px; color: #8888bb; margin-bottom: 24px;
        }
        .school {
            font-size: 13px; color: #7777aa; margin-bottom: 30px;
            line-height: 1.8;
        }
        .divider {
            width: 60px; height: 2px; background: #4444aa;
            margin: 0 auto 30px; border-radius: 1px;
        }
        .btn-group { display: flex; gap: 16px; justify-content: center; }
        .btn {
            padding: 10px 36px; border-radius: 6px; font-size: 14px;
            cursor: pointer; border: none; transition: all 0.2s;
            text-decoration: none; display: inline-block;
        }
        .btn-primary {
            background: #4466cc; color: #fff;
        }
        .btn-primary:hover { background: #5577dd; }
        .btn-outline {
            background: transparent; color: #aaaadd;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .btn-outline:hover { border-color: #4466cc; color: #ccddff; }
    </style>
</head>
<body>
    <div class="card">
        <div class="name">徐文霖</div>
        <div class="subtitle">C++ 后端开发实习生</div>
        <div class="school">
            成都师范学院 · 计算机科学与技术
        </div>
        <div class="divider"></div>
        <div class="btn-group">
            <form action="0" method="post" style="display:inline">
                <button type="submit" class="btn btn-primary">注册</button>
            </form>
            <form action="1" method="post" style="display:inline">
                <button type="submit" class="btn btn-outline">登录</button>
            </form>
        </div>
    </div>
</body>
</html>
